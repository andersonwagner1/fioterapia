<p-toast></p-toast>

<div class="card m-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2><i class="pi pi-calendar-plus mr-2 text-primary text-2xl"></i>Controle de Agendamentos Clínicos</h2>
    <button pButton pRipple label="Novo Agendamento" icon="pi pi-plus" class="p-button-primary" (click)="onNovoAgendamento()"></button>
  </div>

  <div class="flex justify-content-center align-items-center gap-3 mb-4 p-3 bg-gray-50 border-round shadow-1">
    <button pButton pRipple icon="pi pi-angle-left" class="p-button-rounded p-button-text p-button-secondary" (click)="onVoltarDia()" pTooltip="Voltar 1 Dia"></button>
    
    <div class="field m-0" style="width: 250px;">
      <p-calendar 
        [(ngModel)]="dataFiltro" 
        dateFormat="dd/mm/yy" 
        [showIcon]="true"
        (onSelect)="onFiltrarPorData()"
        placeholder="Filtrar por data"
        styleClass="w-full">
      </p-calendar>
    </div>

    <button pButton pRipple icon="pi pi-angle-right" class="p-button-rounded p-button-text p-button-secondary" (click)="onAvancarDia()" pTooltip="Avançar 1 Dia"></button>
    
    <button pButton pRipple icon="pi pi-filter-slash" class="p-button-rounded p-button-text p-button-danger" (click)="onLimparFiltroData()" *ngIf="dataFiltro" pTooltip="Limpar Filtro (Ver Todos)"></button>
  </div>

  <p-table [value]="listaAgendamentosFiltrados" [loading]="loading" responsiveLayout="scroll" class="p-datatable-striped">
    <ng-template pTemplate="header">
      <tr>
        <th>Horário</th>
        <th>Paciente</th>
        <th>Tipo de Sessão</th>
        <th>Profissional</th>
        <th>Status</th>
        <th style="width: 8rem">Ações</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-agendado>
      <tr>
        <td><strong>{{ agendado.dataHoraInicio | date: 'HH:mm' }}</strong></td>
        <td>{{ agendado.nomePaciente }}</td>
        <td>{{ agendado.tipoSessao }}</td>
        <td>{{ agendado.profissional }}</td>
        <td>
          <div class="flex align-items-center gap-2 font-medium">
            <i [class]="getStatusIcon(agendado.status)" 
               [ngClass]="{
                 'text-green-500 text-xl': agendado.status === 'Confirmado',
                 'text-blue-500 text-xl': agendado.status === 'Agendado',
                 'text-red-500 text-xl': agendado.status === 'Cancelado',
                 'text-600 text-xl': agendado.status === 'Finalizado'
               }">
            </i>
            <span [ngClass]="{
                 'text-green-700': agendado.status === 'Confirmado',
                 'text-blue-700': agendado.status === 'Agendado',
                 'text-red-700': agendado.status === 'Cancelado',
                 'text-700': agendado.status === 'Finalizado'
               }">
              {{ agendado.status }}
            </span>
          </div>
        </td>
        <td>
          <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-text p-button-success mr-2" (click)="onEditarAgendamento(agendado)"></button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center p-4 text-muted">
          Nenhum agendamento localizado para esta data.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog [(visible)]="agendaDialog" [style]="{ width: '550px' }" header="Detalhes do Agendamento" [modal]="true" styleClass="p-fluid">
  <ng-template pTemplate="content">
    
    <div class="field col-12 mb-3">
      <label for="paciente">Paciente (Vincular ao Prontuário)</label>
      <p-dropdown 
        id="paciente" 
        [options]="listaPacientes" 
        [(ngModel)]="agendamento.prontuarioId" 
        optionLabel="nome" 
        optionValue="id"
        placeholder="Selecione o Paciente"
        [filter]="true"
        filterBy="nome"
        (onChange)="onSelecionarPaciente($event)">
      </p-dropdown>
    </div>

    <div class="field col-12 mb-3">
      <label for="dataInicio">Data e Horário de Início</label>
      <p-calendar 
        id="dataInicio" 
        [(ngModel)]="agendamento.dataHoraInicio" 
        [showTime]="true" 
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        hourFormat="24">
      </p-calendar>
    </div>

    <div class="grid col-12 p-0 m-0">
      <div class="field col-6 mb-3 pl-0">
        <label for="tipoSessao">Tipo de Sessão</label>
        <p-dropdown id="tipoSessao" [options]="tipoSessaoOptions" [(ngModel)]="agendamento.tipoSessao"></p-dropdown>
      </div>
      <div class="field col-6 mb-3 pr-0">
        <label for="status">Status</label>
        <p-dropdown id="status" [options]="statusOptions" [(ngModel)]="agendamento.status"></p-dropdown>
      </div>
    </div>

    <div class="field col-12 mb-3">
      <label for="profissional">Profissional Responsável</label>
      <input type="text" pInputText id="profissional" [(ngModel)]="agendamento.profissional" />
    </div>

    <div class="field col-12 mb-3">
      <label for="observacoes">Observações / Queixas</label>
      <textarea id="observacoes" pInputTextarea [(ngModel)]="agendamento.observacoes" rows="3"></textarea>
    </div>

  </ng-template>

  <ng-template pTemplate="footer">
    <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text" (click)="agendaDialog = false"></button>
    <button pButton pRipple label="Confirmar Horário" icon="pi pi-check" class="p-button-primary" (click)="onSalvarAgendamento()"></button>
  </ng-template>
</p-dialog>
