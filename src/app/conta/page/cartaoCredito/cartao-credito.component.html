<div class="grid">
    <p-toast></p-toast>
    
    <div class="col-12">
        <app-selecionar-data (evtDataSelecionada)="evReceberData($event)" [dataSelecionada]="dataSelecionada"></app-selecionar-data>
    </div>

    <div class="card col-12">
        <form [formGroup]="formulario">
            <div class="grid">
                <div class="col-6">
                    <div formGroupName="bancoConta">                        
                        <p-selectButton
                            [options]="listaBancos"
                            formControlName="id"               
                            optionLabel="banco.dsBanco"
                            optionValue="id"
                            (onOptionClick)="onSelecionarCartaoCredito()"
                            >
                        </p-selectButton>
                    </div>
                </div>

                <div class="col-6">
                    Saldo: {{somarTotal | moeda}}
                </div>
            </div>

            <div class="grid">
                <div class="col-12">
                    <p-card header="Registrar Movimentação" subheader="Reigistrar movimentação para cartão de credito" >
                        <div class="grid p-fluid">
                            <div class="col-2 field">
                                <label for="dia">Dia</label>   
                                          
                                <input type="text" formControlName="nrDia" pInputText id="dia" mas required autofocus  [ngClass]="{'ng-invalid ng-dirty' : submitted && !registro.nrDia}"/>
                                <small class="ng-dirty ng-invalid" *ngIf="submitted && !registro.nrDia">dia é obrigatório</small>
                            </div>

                            <div class="col-3 field">
                                <div formGroupName="tipoMovimentacao">
                                    <label for="tipoMovimentacao">Tipo de Movimentação</label>
                                    <p-dropdown
                                        [filter]="true"
                                        formControlName="id"
                                        [options]="listaTipoMovimentacao"
                                        optionLabel="dsTipoMovimentacao"
                                        optionValue="id"
                                        >
                                    </p-dropdown>
                                </div>
                            </div>
            
                            <div class="col-3 field">
                                <label for="valor">Valor Credito</label>
                                <p-inputNumber   
                                formControlName="vlCompra"                
                                
                                inputId="locale-german"
                                mode="decimal"
                                locale="de-DE"
                                [minFractionDigits]="2"
                                required />                  
            
                             </div>
                
                            
                             <div class="col-1">                
                                <label >Parcelas</label>
                                <p-inputNumber formControlName="nrParcelas" />
                             </div>
                
                        </div>
            
                        <div class="grid p-fluid">
                            <div class="col-12 field">
                                <label for="description">Descrição</label>
                                <textarea id="description" pInputTextarea formControlName="dsObservacao" required rows="3" cols="20"></textarea>
                            </div>
                        </div>
            
                        <ng-template pTemplate="footer">
                            <div class="flex gap-3 mt-1">
                                <p-button label="Novo" severity="secondary" (click)=onNovo() />
                                <p-button label="Salvar" (click)=onSalvar()/>
                            </div>
                        </ng-template>
                    </p-card>
                </div>
            </div>

      

        </form>
    </div> 


    <div class="col-12">
        <div class="card px-12 py-12" >

            <p-table [value]="listaRegistros"
            rowGroupMode="subheader" 
           
            >
                <ng-template pTemplate="header">
                    <tr>
                        <th>Data Movimentacao</th>
                        <th>Tipo Movimentação</th>
                        <th>Valor da Compra</th>
                        <th>Observação</th>
                        <th>Ações</th>
                    </tr>
                </ng-template>

                <ng-template pTemplate="groupfooter" let-reg>
                    <tr>
                        <td colspan="5" class="text-right font-bold pr-6">
                            Total Customers: {{somarTotal | moeda}}
                        </td>
                    </tr>
                </ng-template>

                <ng-template pTemplate="body" let-reg>
                    <tr>
                        <td>{{ reg.nrDia }}</td>
                        <td>{{ reg.tipoMovimentacao.dsTipoMovimentacao }}</td>
                        <td>{{ reg.vlCompra | moeda}}</td>
                        <td>{{ reg.dsObservacao }}</td>
                        <td>
                            <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-success mr-2" (click)="onEditarRegistroMovimentacao(reg)"></button>                           
                            <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-warning" (click)="onConfirmarExclucaoRegistro(reg)"></button>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>

</div>
