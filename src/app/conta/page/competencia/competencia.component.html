
<div class="grid">
    <div class="col-12">
        <div class="card px-6 py-6">
            <p-toast></p-toast>
            <p-toolbar styleClass="mb-4">

                <!--BOTÃO NOVO E EXCLUIR-->
                <ng-template pTemplate="left">
                    <div class="my-2">
                        <button pButton pRipple label="Novo" icon="pi pi-plus" class="p-button-success mr-2" (click)="onAbrirTelaNovoRegistro()"></button>
                        
                    </div>
                </ng-template>

                <!--BOTÃO IMPORTAR E EXPORTAR-->

            </p-toolbar>

            <!-- LISTA DE REGISTRO DA TABELA
                verifique os campos globalfilderFiles para realizar os filtros
            -->
            <p-table #dt [value]="listaRegistros" [columns]="cols" responsiveLayout="scroll"
            [rows]="12" [globalFilterFields]="['dsConta','icAtivo']"
            [paginator]="true"
            [showCurrentPageReport]="true"
            currentPageReportTemplate="Mostrando {first} a {last} no total de {totalRecords} registros"
            [(selection)]="registrosSelecionados"
            selectionMode="multiple"
            [rowHover]="true"
            dataKey="id">
                <ng-template pTemplate="caption">
                    <div class="flex flex-column md:flex-row md:justify-content-between md:align-items-center">
                        <h5 class="m-0">{{titulo}}</h5>                       
                    </div>
                </ng-template>
                <ng-template pTemplate="header">
                    <tr>

                        <!--Titulo do campos-->
                        <th>Id</th>
                        <th>Ano</th>
                        <th>Mês</th>
                        <th>Mes/Ano</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-dataRegistro>
                    <tr>


                        <!--REgistros dos campos -->
                        <td style="width:14%; min-width:10rem;"><span class="p-column-title">Id</span>
                            {{dataRegistro.id}}
                        </td>
                        <td style="width:14%; min-width:10rem;"><span class="p-column-title">dsBanco</span>
                            {{dataRegistro.nrAno}}
                        </td>
                        <td style="width:14%; min-width:10rem;"><span class="p-column-title">dsBanco</span>
                            {{dataRegistro.nrMes}}
                        </td>
                        <td>
                            {{dataRegistro.dsMesAno}}
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>

        <!--
        Tela para editar ou salvar novos registros

        -->
        <p-dialog [(visible)]="telaRegistro" [style]="{width: '450px'}" header="Detalhe de {{titulo}}" [modal]="true" class="p-fluid">
            <ng-template pTemplate="content">

                <div class="field">
                    <label for="name">Ano</label>
                    <input type="text" pInputText id="name" [(ngModel)]="registro.nrAno" required autofocus [ngClass]="{'ng-invalid ng-dirty' : submitted && !registro.nrAno}"/>
                    <small class="ng-dirty ng-invalid" *ngIf="submitted && !registro.nrAno">Ano é obrigatório</small>
                </div>

            </ng-template>

            <ng-template pTemplate="footer">
                <button pButton pRipple label="Cancelar" icon="pi pi-times" class="p-button-text" (click)="esconderCaixaDialogo()"></button>
                <button pButton pRipple label="Salvar" icon="pi pi-check" class="p-button-text" (click)="onSalvarRegistro()"></button>
            </ng-template>
        </p-dialog>

        <!-- tela de confirmaçãode excluir o registro selecionados
        LEMBRAR DE ALTERAR O TEXTO
        -->
        <p-dialog [(visible)]="telaConfirmacaoRegistroSelecionado" header="Confirmar" [modal]="true" [style]="{width:'450px'}">
            <div class="flex align-items-center justify-content-center">
                <i class="pi pi-exclamation-triangle mr-3" style="font-size: 2rem"></i>
                <span *ngIf="registro">Você tem certeze que deseja excluir este conta <b>{{registro.dsConta}}</b>?</span>
            </div>
            <ng-template pTemplate="footer">
                <button pButton pRipple icon="pi pi-times" class="p-button-text" label="Não" (click)="excluirTela = false"></button>
                <button pButton pRipple icon="pi pi-check" class="p-button-text" label="Sim" (click)="confirmarExclusaoRegistro()"></button>
            </ng-template>
        </p-dialog>

        <!-- TELA PARA EXCLUIR VARIOS REGISTRO-->
        <p-dialog [(visible)]="telaConfirmacaoExclusao" header="Confirmar" [modal]="true" [style]="{width:'450px'}">
            <div class="flex align-items-center justify-content-center">
                <i class="pi pi-exclamation-triangle mr-3" style="font-size: 2rem"></i>
                <span>Você tem certeze que deseja excluir todos os registro selecionados?</span>
            </div>
            <ng-template pTemplate="footer">
                <button pButton pRipple icon="pi pi-times" class="p-button-text" label="Não" (click)="deleteProductsDialog = false"></button>
                <button pButton pRipple icon="pi pi-check" class="p-button-text" label="Sim" (click)="onConfirmarExcluicaoRegistroSelecionado()"></button>
            </ng-template>
        </p-dialog>
    </div>
</div>
