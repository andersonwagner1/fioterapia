<p-toast></p-toast>

<div class="card m-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h2><i class="pi pi-calendar-plus mr-2 text-primary text-2xl"></i>Controle de Agendamentos Clínicos</h2>
    <button pButton pRipple label="Novo Agendamento" icon="pi pi-plus" class="p-button-primary" (click)="onNovoAgendamento()"></button>
  </div>

  <div class="flex justify-content-center align-items-center gap-3 mb-4 p-3 bg-gray-50 border-round shadow-1">
    <button pButton pRipple icon="pi pi-angle-left" class="p-button-rounded p-button-text p-button-secondary" (click)="onVoltarDia()" pTooltip="Voltar 1 Dia"></button>
    
    <div class="field m-0" style="width: 250px;">
      <p-calendar 
        [(ngModel)]="dataFiltro" 
        dateFormat="dd/mm/yy" 
        [showIcon]="true"
        (onSelect)="onFiltrarPorData()"
        placeholder="Filtrar por data"
        styleClass="w-full">
      </p-calendar>
    </div>

    <button pButton pRipple icon="pi pi-angle-right" class="p-button-rounded p-button-text p-button-secondary" (click)="onAvancarDia()" pTooltip="Avançar 1 Dia"></button>
    
    <button pButton pRipple icon="pi pi-filter-slash" class="p-button-rounded p-button-text p-button-danger" (click)="onLimparFiltroData()" *ngIf="dataFiltro" pTooltip="Limpar Filtro (Ver Todos)"></button>
  </div>

  <p-table [value]="listaAgendamentosFiltrados" [loading]="loading" responsiveLayout="scroll" class="p-datatable-striped">
    <ng-template pTemplate="header">
      <tr>
        <th>Horário</th>
        <th>Paciente</th>
        <th>Tipo de Sessão</th>
        <th>Profissional</th>
        <th>Status</th>
        <th style="width: 8rem">Ações</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-agendado>
      <tr>
          <td>{{ agendado.horaInicial }}</td>
          <td>{{ agendado.nome }}</td>
          <td>{{ agendado.tipoSessao }}</td>
          <td>{{ agendado.profissional }}</td>
          <td>
            <div class="flex align-items-center gap-2 font-medium">
              <i [class]="getStatusIcon(agendado.icSituacao)" 
                 [ngClass]="{
                  'text-green-500 text-xl': agendado.icSituacao === 'Confirmado',
                  'text-blue-500 text-xl': agendado.icSituacao === 'Agendado',
                  'text-red-500 text-xl': agendado.icSituacao === 'Cancelado',
                  'text-600 text-xl': agendado.icSituacao === 'Finalizado'
                }">
              </i>
              <span [ngClass]="{
                  'text-green-700': agendado.icSituacao === 'Confirmado',
                  'text-blue-700': agendado.icSituacao === 'Agendado',
                  'text-red-700': agendado.icSituacao === 'Cancelado',
                  'text-700': agendado.icSituacao === 'Finalizado'
                }">
                {{ agendado.icSituacao }}
              </span>
            </div>
          </td>
        <td>
          <div class="flex align-items-center gap-2">
            <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-text p-button-success mr-2" (click)="onEditarAgendamento(agendado)"></button>
            <button pButton pRipple icon="pi pi-file" class="p-button-rounded p-button-text p-button-success mr-2" (click)="onAbrirProntuario(agendado)"></button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center p-4 text-muted">
          Nenhum agendamento localizado para esta data.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog 
  [(visible)]="agendaDialog" 
  [style]="{ width: '550px' }" 
  [modal]="true" 
  styleClass="p-fluid">
  
  <ng-template pTemplate="header">
    <div class="flex align-items-center gap-2">
      <i class="pi pi-calendar-plus text-primary text-xl"></i>
      <span class="font-semibold text-xl">Detalhes do Agendamento</span>
    </div>
  </ng-template>
  
  <ng-template pTemplate="content">
    
    <div *ngIf="agendamento?.paciente" class="grid col-12 p-0 m-0 mb-3">
      
      <div class="field col-4 pl-0 pb-0 mb-0">
        <label for="prontuarioId">Nº Prontuário</label>
        <input 
          type="number" 
          pInputText 
          id="prontuarioId" 
          [(ngModel)]="agendamento.paciente.id" 
          (blur)="onBlurPacientePorProntuario()"
          placeholder="Ex: 1042" />
      </div>

      <div class="field col-8 pr-0 pb-0 mb-0">
        <label for="pacienteNome">Paciente</label>
        <div class="p-inputgroup">
          <input 
            type="text" 
            pInputText 
            id="pacienteNome" 
            [(ngModel)]="agendamento.paciente.nome" 
            placeholder="Digite o nome do paciente..." />
          
          <button 
            type="button" 
            pButton 
            pRipple 
            icon="pi pi-search" 
            class="p-button-primary"
            pTooltip="Pesquisar Paciente"
            tooltipPosition="top"
            (click)="abrirPesquisaPacientes()">
          </button>
        </div>
      </div>

    </div>

    <div class="field col-12 mb-3">
      <label for="dataInicio">Data e Horário de Início</label>
      <p-calendar 
        id="dataInicio" 
        [(ngModel)]="agendamento.dtHoraInicial" 
        [showTime]="true" 
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        appendTo="body"
        hourFormat="24">
      </p-calendar>
    </div>

    <div class="field col-12 mb-3">
      <label for="dataFinal">Data e Horário de Final</label>
      <p-calendar 
        id="dataFinal" 
        [(ngModel)]="agendamento.dtHoraFinal" 
        [showTime]="true" 
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        appendTo="body"
        hourFormat="24">
      </p-calendar>
    </div>

    <div class="grid col-12 p-0 m-0">
      <div class="field col-6 mb-3 pl-0">
        <label for="tipoSessao">Tipo de Sessão</label>
        <p-dropdown 
          id="tipoSessao" 
          [options]="tipoSessaoOptions" 
          [(ngModel)]="agendamento.tipoSessao"
          placeholder="Selecione">
        </p-dropdown>
      </div>
      
      <div class="field col-6 mb-3 pr-0">
        <label for="status">Status</label>
        <p-dropdown 
          id="status" 
          [options]="statusOptions" 
          [(ngModel)]="agendamento.icSituacao"
          placeholder="Selecione">
        </p-dropdown>
      </div>
    </div>

    <div *ngIf="agendamento?.usuario" class="grid col-12 p-0 m-0 mb-3">
      
      <div class="field col-4 pl-0 pb-0 mb-0">
        <label for="usuarioId">Cod: Fisioterapia</label>
        <input 
          type="number" 
          pInputText 
          id="usuarioId" 
          [(ngModel)]="agendamento.usuario.id" 
          (blur)="onBlurPacientePorUsuario()"
          placeholder="Ex: 12" />
      </div>

      <div class="field col-8 pr-0 pb-0 mb-0">
        <label for="usuarioNome">Fisioterapia</label>
        <div class="p-inputgroup">
          <input 
            type="text" 
            pInputText 
            id="usuarioNome" 
            [(ngModel)]="agendamento.usuario.nome" 
            placeholder="Nome do usuário..." />
          
          <button 
            type="button" 
            pButton 
            pRipple 
            icon="pi pi-search" 
            class="p-button-primary"
            pTooltip="Pesquisar Usuário"
            tooltipPosition="top"
            (click)="onBlurPacientePorUsuario()">
          </button>
        </div>
      </div>

    </div>

    <div class="field col-12 mb-3">
      <label for="observacoes">Observações / Queixas</label>
      <textarea 
        id="observacoes" 
        pInputTextarea 
        [(ngModel)]="agendamento.dsObservacaoQueixas" 
        rows="3" 
        [autoResize]="true">
      </textarea>
    </div>

  </ng-template>

  <ng-template pTemplate="footer">
    <button 
      pButton 
      pRipple 
      label="Cancelar" 
      icon="pi pi-times" 
      class="p-button-text p-button-secondary" 
      (click)="agendaDialog = false">
    </button>
    <button 
      pButton 
      pRipple 
      label="Confirmar Horário" 
      icon="pi pi-save" 
      class="p-button-primary" 
      (click)="onSalvarAgendamento()">
    </button>
  </ng-template>
</p-dialog>
